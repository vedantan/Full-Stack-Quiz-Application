spring.application.name=Api-Gateway
server.port=8765

# ? Disable Eureka-based routing (we are using direct URLs)
#spring.cloud.gateway.discovery.locator.enabled=true
#spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ? QUESTION SERVICE (default port = 8080)
spring.cloud.gateway.routes[0].id=question-service
spring.cloud.gateway.routes[0].uri=lb://QUESTION-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/questions/**

# ? QUIZ SERVICE (your config = 8090)
spring.cloud.gateway.routes[1].id=quiz-service
spring.cloud.gateway.routes[1].uri=lb://QUIZ-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/quiz/**

# ? AUTH SERVICE (your config = 8070)
spring.cloud.gateway.routes[2].id=auth-service
spring.cloud.gateway.routes[2].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/auth/**

# ? JWT SECRET (must match auth service)
jwt.secret=myverysecurejwtsecretkeymyverysecurejwtsecretkey